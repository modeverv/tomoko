[runtime]
database_url_env = "TOMOKO_DATABASE_URL"
jsonl_log = "logs/v2-runtime.jsonl"
llm_ready_urls = ["http://127.0.0.1:8081/v1/models", "http://127.0.0.1:8082/v1/models"]
voicevox_ready_url = "http://127.0.0.1:50122/version"

[vad]
sample_rate = 16000
speech_threshold = 0.5
silence_ms = 400
pre_roll_ms = 500

[vap]
min_silence_ms = 150
delta_silence_ms = 650
yielding_threshold = 0.90

[stt.apple_speech]
command = ".cache/tomoko/AppleSpeechSTT.app/Contents/MacOS/apple-speech-stt"
language = "ja-JP"
on_device = true
timeout_sec = 30

[tts.voicevox_chunked]
url = "http://127.0.0.1:50122"
speaker_id = 8
sample_rate = 24000
segment_length_sec = 0.6
content_type = "audio/wav"

[llm.main]
url = "http://127.0.0.1:8082"
model = "gemma-4-26b-a4b-it-mlx"
local_model_path = "v1/loras/lora/fused_model"
draft_model = "z-lab/gemma-4-26B-A4B-it-DFlash"

[llm.summary]
url = "http://127.0.0.1:8081"
model = "gemma-4-31b-it-mlx"
draft_model = "z-lab/gemma-4-31B-it-DFlash"

[scheduler]
speak_threshold = 0.55
append_threshold = 0.55
replace_margin = 0.25
stop_threshold = 0.8

[ocr]
capture_command = "screencapture"
primary_ocr = "vision"
fallback_ocr = "tesseract"
metadata_command = "osascript"

[user_status]
capture_interval_sec = 60
artifact_retention_sec = 300
