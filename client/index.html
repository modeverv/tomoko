<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tomoko v2</title>
    <link rel="stylesheet" href="/client/styles.css" />
  </head>
  <body>
    <main>
      <header class="topbar">
        <section id="status">disconnected</section>
        <section id="debug"></section>
      </header>
      <section id="transcript"></section>
      <section id="timeline" aria-label="conversation timeline">
        <ol id="timeline-items"></ol>
      </section>
      <section class="controls">
        <button id="connect" type="button">Connect</button>
        <button id="stop-audio" type="button">Stop</button>
        <select id="audio-output"></select>
      </section>
    </main>
    <script type="module" src="/client/main.js"></script>
  </body>
</html>
