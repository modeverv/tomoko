<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tomoko</title>
    <link rel="stylesheet" href="/client/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel" aria-labelledby="title">
        <div class="identity">
          <div class="portrait" aria-hidden="true">
            <img id="tomoko-image" src="/assets/images/tomoko-neutral.svg" alt="" />
          </div>
          <div>
            <h1 id="title">Tomoko</h1>
            <p id="status">idle</p>
          </div>
        </div>

        <div class="meters" aria-label="Audio status">
          <div>
            <span>State</span>
            <strong id="vad-state">idle</strong>
          </div>
          <div>
            <span>Attention</span>
            <strong id="attention-mode">ambient</strong>
          </div>
          <div>
            <span>Emotion</span>
            <strong id="emotion">neutral</strong>
          </div>
          <div>
            <span>STT</span>
            <strong id="latency">--</strong>
          </div>
          <div>
            <span>Sent</span>
            <strong id="bytes">0</strong>
          </div>
        </div>

        <div class="controls">
          <button id="start" type="button">Start</button>
          <button id="stop" type="button" disabled>Stop</button>
          <button id="speech-end-marker" type="button" disabled style="background-color: #e67e22; color: white;">[発話終わり]</button>
        </div>

        <div class="device-controls" aria-label="Audio devices">
          <label>
            <span>Input</span>
            <select id="audio-input-device">
              <option value="">Default microphone</option>
            </select>
          </label>
          <label>
            <span>Output</span>
            <select id="audio-output-device">
              <option value="">Default speaker</option>
            </select>
          </label>
          <p id="device-status">default devices</p>
        </div>

        <div class="debug-controls" aria-label="Recording tools">
          <button id="record-noise" type="button" disabled>Noise 1s</button>
          <button id="record-read" type="button" disabled>Read 5s</button>
          <button id="next-read-prompt" type="button">Next</button>
        </div>

        <div class="read-prompt" aria-label="Read prompt">
          <span>Read</span>
          <p id="read-prompt-text"></p>
        </div>

        <div class="debug-result" aria-label="Recording result">
          <span>Debug</span>
          <p id="debug-result-text">--</p>
        </div>

        <div class="candidate-result" aria-label="Candidate result">
          <span>Candidate</span>
          <p id="candidate-result-text">--</p>
        </div>

        <div class="reply-container" aria-label="Reply text">
          <p id="reply-text"></p>
        </div>
      </section>
      <section class="stt-panel" aria-labelledby="stt-log-title">
        <div class="stt-panel-header">
          <h2 id="stt-log-title">Log</h2>
          <span>transcript_final / reply_text</span>
        </div>
        <div id="transcript-log-entries" class="transcript-log-entries"></div>
      </section>
      <section class="monitor-panel" aria-labelledby="monitor-title">
        <div class="stt-panel-header">
          <h2 id="monitor-title">Monitor</h2>
          <span>server events only</span>
        </div>
        <div class="monitor-grid" aria-label="Internal state monitor">
          <div class="monitor-item">
            <span>STT partial</span>
            <p id="partial-transcript">--</p>
          </div>
          <div class="monitor-item">
            <span>STT final</span>
            <p id="final-transcript">--</p>
          </div>
          <div class="monitor-item">
            <span>Reply stream</span>
            <p id="reply-stream">--</p>
          </div>
          <div class="monitor-item">
            <span>ContextSnapshot</span>
            <p id="context-summary">--</p>
          </div>
          <div class="monitor-item">
            <span>Short memory</span>
            <p id="short-memory-status">--</p>
          </div>
        </div>
        <div id="short-memory-notes" class="short-memory-notes"></div>
      </section>
    </main>
    <script type="module" src="/client/main.js"></script>
  </body>
</html>
